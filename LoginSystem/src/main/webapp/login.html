<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .error-text {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 5px;
            display: block;
            min-height: 20px;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
            display: none;
        }

        .demo-credentials {
            margin-top: 30px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 5px;
            font-size: 14px;
        }

        .demo-credentials h4 {
            color: #4a5568;
            margin-bottom: 10px;
        }

        .demo-credentials p {
            color: #718096;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h2>Login System</h2>
            
            <div id="errorMessage" class="error-message"></div>
            
            <form id="loginForm" onsubmit="return validateForm()" method="post" action="login">
                <div class="form-group">
                    <label for="username">Username or Email:</label>
                    <input type="text" id="username" name="username" 
                           placeholder="Enter username or email">
                    <small class="error-text" id="usernameError"></small>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" 
                           placeholder="Enter password">
                    <small class="error-text" id="passwordError"></small>
                </div>

                <button type="submit" id="loginBtn">Login</button>
            </form>

            <div class="demo-credentials">
                <h4>Demo Credentials:</h4>
                <p>Username: john_doe / Password: password123</p>
                <p>Username: jane_smith / Password: secure456</p>
                <p>Email: bob@example.com / Password: welcome789</p>
            </div>
        </div>
    </div>

    <script>
        // Check for error parameter in URL
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            
            if (error === 'empty') {
                showMessage('Username and password are required');
            } else if (error === 'invalid') {
                showMessage('Invalid username/email or password');
            }
        };

        function showMessage(message) {
            let errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function validateForm() {
            // Clear previous errors
            document.getElementById('usernameError').textContent = '';
            document.getElementById('passwordError').textContent = '';
            
            // Get form values
            let username = document.getElementById('username').value.trim();
            let password = document.getElementById('password').value;
            
            // Validation flags
            let isValid = true;
            
            // Validate username/email
            if (username === '') {
                document.getElementById('usernameError').textContent = 'Username or email is required';
                isValid = false;
            } else if (username.length < 3) {
                document.getElementById('usernameError').textContent = 'Must be at least 3 characters';
                isValid = false;
            }
            
            // Validate password
            if (password === '') {
                document.getElementById('passwordError').textContent = 'Password is required';
                isValid = false;
            } else if (password.length < 6) {
                document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
                isValid = false;
            }
            
            return isValid;
        }

        // Real-time validation
        document.getElementById('username').addEventListener('input', function() {
            let username = this.value.trim();
            if (username.length > 0 && username.length < 3) {
                document.getElementById('usernameError').textContent = 'Username too short';
            } else {
                document.getElementById('usernameError').textContent = '';
            }
        });

        document.getElementById('password').addEventListener('input', function() {
            let password = this.value;
            if (password.length > 0 && password.length < 6) {
                document.getElementById('passwordError').textContent = 'Password too short';
            } else {
                document.getElementById('passwordError').textContent = '';
            }
        });
    </script>
</body>
</html>
